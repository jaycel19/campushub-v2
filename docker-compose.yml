version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: campushub_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 743S5bLz?^w|
      POSTGRES_DB: campushub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: